version: '3.8'
services:
  app:
    build: .
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DOWNLOADS_PATH=/app/downloads
      - FILE_MAX_AGE_HOURS=24
      - CORS_ORIGIN=*
    volumes:
      - ./downloads:/app/downloads
    restart: always
